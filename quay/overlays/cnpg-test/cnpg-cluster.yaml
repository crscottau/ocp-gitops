apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "20"  
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"    
  name: quay-pg-cluster
  namespace: quay
spec:
  instances: 3

  # Ensure postgres pods run on different nodes
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    # Move the pod if a node becomes available again
    podAntiAffinityType: required

  # Create the empty Quay database
  bootstrap:
    initdb:
      database: quay-registry-quay-database
      encoding: UTF8
      localeCType: C
      localeCollate: C
      owner: quay-registry-quay-database
  
  storage:
    size: 50Gi
  
