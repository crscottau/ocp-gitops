apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- cnpg-sub.yaml
- cnpg-cluster.yaml
- quay-database-extension-enable-job.yaml

patches:
# Turn off the Quay managed database
- patch: |-
    apiVersion: quay.redhat.com/v1
    kind: QuayRegistry
    metadata:
      name: quay-registry
      namespace: quay
    spec:
      components:
        - kind: quay	
          managed: true	
        - kind: postgres
          managed: false      
        - kind: clair	
          managed: true	
        - kind: redis	
          managed: true	
        - kind: horizontalpodautoscaler	
          managed: true	
        - kind: objectstorage	
          managed: false	
        - kind: route	
          managed: true	
        - kind: mirror	
          managed: true	
        - kind: monitoring	
          managed: false	
        - kind: tls	
          managed: true	
        - kind: clairpostgres	
          managed: true
