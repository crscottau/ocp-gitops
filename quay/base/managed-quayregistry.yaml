apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: quay-registry
  namespace: quay
  annotations:
    argocd.argoproj.io/sync-wave: "50"  
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"    
spec:
  configBundleSecret: quay-registry-config-bundle
  components:
    - kind: quay	
      managed: true	
    - kind: postgres
      managed: false      
    - kind: clair	
      managed: true	
    - kind: redis	
      managed: true	
    - kind: horizontalpodautoscaler	
      managed: true	
    - kind: objectstorage	
      managed: false	
    - kind: route	
      managed: true	
    - kind: mirror	
      managed: true	
    - kind: monitoring	
      managed: false	
    - kind: tls	
      managed: true	
    - kind: clairpostgres	
      managed: true
